<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hayden's Memory Match</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <!-- Back-to-hub button — self-contained, replicates the hub's purple pill.
       Placed after style.css and every key property set explicitly so the
       game's own CSS cannot bleed in. -->
  <style>
    .bh-home-btn {
      position: fixed;
      top: 70px;
      left: 12px;
      z-index: 9999;
      background: #8b5cf6;
      color: #fff;
      text-decoration: none;
      border: none;
      border-radius: 999px;
      padding: 16px clamp(18px, 4vw, 30px);
      font-family: "Comic Sans MS", "Chalkboard SE", "Trebuchet MS", system-ui, sans-serif;
      font-size: clamp(20px, 4.5vw, 28px);
      font-weight: bold;
      line-height: 1;
      box-shadow: 0 6px 0 rgba(0,0,0,.15);
      min-height: 64px;
      box-sizing: border-box;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      white-space: nowrap;
    }
    .bh-home-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 rgba(0,0,0,.15); }
  </style>
</head>
<body>

  <a href="https://hayden.brieflyhome.com" class="bh-home-btn">🏠 Home</a>

  <header id="top-bar">
    <div id="logo">✨ Hayden's Memory Match</div>
    <div id="stars-row" aria-label="Matched pairs"></div>
  </header>

  <main id="app">
    <div id="grid-container"></div>
  </main>

  <div id="attempts-bar">Tries: <span id="attempts-count">0</span></div>

  <div id="win-screen" hidden>
    <div id="confetti-container" aria-hidden="true"></div>
    <div id="win-box">
      <div id="win-emoji">🎉</div>
      <div id="win-msg">You found them all, Hayden!<br>Amazing!</div>
      <div id="win-stars">⭐⭐⭐⭐⭐⭐⭐⭐⭐⭐</div>
      <button id="play-again-btn">Play Again!</button>
    </div>
  </div>

  <!-- Shared GIF celebration library (hosted once, used across games) -->
  <script src="https://reindeerworks.github.io/hayden-shared-assets/celebrate.js"></script>
  <script src="data/words.js"></script>
  <script src="main.js"></script>
</body>
</html>
